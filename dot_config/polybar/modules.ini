animation-charging-3 = ´ûê
animation-charging-4 = ´ûë
animation-charging-5 = ´ûè
animation-charging-6 = ´ûä

animation-charging-framerate = 750

[module/network]
type = internal/network
interface = wlp2s0

format-connected = <label-connected> <ramp-signal>
format-disconnected = <label-disconnected>

format-connected-padding = 4pt
format-disconnected-padding = 4pt

format-disconnected-suffix = ´¬®

