[module/date]
type = internal/date
time = "%I:%M %p"

label = %time%
label-font = 2
format-padding = 4pt

[module/workspaces]
type = internal/xworkspaces
enable-scroll = false

icon-0 = 1;´óú
icon-1 = 2;´óª
icon-2 = 3;´ó®
icon-3 = 4;´ó¼
icon-4 = 5;´ó»
icon-5 = 6;´ó▓
icon-6 = 7;´óÁ
icon-7 = 8;´ó©
icon-8 = 9;´ó╗
icon-default = ´ë╣

label-active = %icon%
label-occupied = %icon%
label-urgent = %icon%
label-empty = %icon%

label-active-foreground = ${colors.green}
label-urgent-foreground = ${colors.red}

label-active-underline = ${colors.green}

label-active-padding = 1
label-occupied-padding = 1
label-urgent-padding = 1
label-empty-padding = 1

[module/title]
type = internal/xwindow

label-font = 2
label-maxlen = 30

label-empty = "Desktop"
label-empty-font = 2

[module/audio]
type = internal/pulseaudio
sink = alsa_output.pci-0000_00_1f.3.analog-stereo

; Use PA_VOLUME_UI_MAX (~153%) if true, or PA_VOLUME_NORM (100%) if false
; Default: true
use-ui-max = true

interval = 5

format-volume = <label-volume> <ramp-volume>
format-muted = <label-muted>

label-muted = Muted

label-volume-font = 2
label-muted-font = 2

ramp-volume-0 = ´®¥
ramp-volume-1 = ´®┐
ramp-volume-2 = ´®¢

[module/battery]
type = internal/battery

battery = BAT0
adapter = AC

poll-interval = 2

format-charging = <label-charging> <animation-charging>
format-discharging = <label-discharging> <ramp-capacity>

label-charging = %percentage%%
label-discharging = %percentage%%

label-charging-font = 2
label-discharging-font = 2

ramp-capacity-0 = ´ò╣
ramp-capacity-1 = ´ò║
ramp-capacity-2 = ´ò╗
ramp-capacity-3 = ´ò╝
ramp-capacity-4 = ´ò¢
ramp-capacity-5 = ´ò¥
ramp-capacity-6 = ´ò┐
