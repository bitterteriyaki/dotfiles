[global/wm]
include-file = $HOME/.config/polybar/modules.ini
include-file = $HOME/.config/polybar/colors.ini

[bar/main]
monitor = ${env:MONITOR:}

fixed-center = true

width = 100%
height = 24pt

foreground = ${colors.foreground}
background = ${colors.background}

border-bottom-size = 2pt
border-color = ${colors.blue}

padding-right = 10pt
module-margin = 8pt

font-0 = "JetBrains Mono Nerd Font:pixelsize=11;3"
font-1 = "Source Han Sans JP:pixelsize=11;3"
font-2 = "Source Han Sans KR:pixelsize=11;3"
font-3 = "Source Han Sans CN:pixelsize=11;3"
font-4 = "Noto Color Emoji:scale=10;3"

modules-left = workspaces
modules-center = title
modules-right = audio battery network date

separator = //
