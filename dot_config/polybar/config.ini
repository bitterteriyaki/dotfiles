[global/wm]
include-file = $HOME/.config/polybar/modules.ini
include-file = $HOME/.config/polybar/colors.ini

[bar/main]
width = 100%
height = 32pt

foreground = ${colors.foreground}
background = ${colors.background}

line-size = 2pt

border-color = #00000000
border-size = 8pt
border-bottom-size = 0pt

padding = 12pt
module-margin = 8pt

font-0 = "JetBrains Mono Nerd Font:pixelsize=16;4"
font-1 = "JetBrains Mono Nerd Font:pixelsize=11;4"

modules-left = date workspaces title
modules-right = audio battery network

separator = |

